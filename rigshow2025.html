    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素

            const resetBtn = document.getElementById('reset-btn');
            const infoBtn = document.getElementById('info-btn-mobile');

            const areaDetails = document.getElementById('area-details');
            const detailsTitle = document.getElementById('details-title');
            const detailsDescription = document.getElementById('details-description');
            const detailsLink = document.getElementById('details-link');
            const closeDetails = document.getElementById('close-details');
            const overlay = document.getElementById('overlay');
            const drawStartBtn = document.getElementById('draw-start-mobile');
            const drawEndBtn = document.getElementById('draw-end-mobile');
            const drawClearBtn = document.getElementById('draw-clear-mobile');
            const drawStartDesktopBtn = document.getElementById('draw-start-desktop');
            const drawEndDesktopBtn = document.getElementById('draw-end-desktop');
            const drawClearDesktopBtn = document.getElementById('draw-clear-desktop');
            const coordinatesOutput = document.getElementById('coordinates-output');
            const copyBtn = document.getElementById('copy-btn');
            const drawingHint = document.getElementById('drawing-hint');
            const imageMapContainer = document.querySelector('.image-map-container');
            const coordinateDisplay = document.getElementById('coordinate-display');
            const mouseCoords = document.getElementById('mouse-coords');
            const polygonPoints = document.getElementById('polygon-points');
            
            // 区域详细信息数据
            const areaDetailsData = {
                '井架': '井架是石油钻机的重要组成部分，提供支撑结构，用于悬挂和操作钻具。现代井架通常采用钢结构，具有足够的强度和稳定性，能够承受钻具的重量和钻探过程中的各种载荷。',
                '绞车': '绞车是钻机的核心设备之一，主要用于提升和下放钻具。它通过钢丝绳系统与天车、游车配合，实现钻具的垂直运动。绞车通常由电机或柴油机驱动，具有多个档位以适应不同的工作需求。',
                '天车': '天车位于井架顶部，是一组滑轮系统，与绞车和游车配合使用。它改变钢丝绳的方向，使绞车能够有效地提升和下放钻具。天车通常由多个滑轮组成，能够承受很大的拉力。',
                '游车': '游车是一个可移动的滑轮系统，悬挂在井架内的钢丝绳上，与天车和绞车配合使用。它通过钢丝绳的收放实现上下移动，用于提升和下放钻具。游车的设计使其能够平稳地在井架内运行。',
                '大钩': '大钩是悬挂在游车下方的重要部件，用于连接和悬挂钻具。它能够承受钻具的重量，并允许钻具在钻探过程中旋转。大钩通常具有安全锁扣装置，确保钻具连接牢固。',
                '水龙头': '水龙头是连接旋转钻杆和泥浆循环系统的关键部件。它允许钻杆在旋转的同时，将泥浆从地面输送到井底。水龙头通常具有旋转密封装置，防止泥浆泄漏，并能够承受高压和高速旋转。',
                '转盘': '转盘是钻机的旋转设备，位于钻台中心，用于驱动钻杆旋转。它通过齿轮传动系统将动力传递给钻杆，使钻杆能够在井底破碎岩石。转盘的转速和扭矩可以根据不同的钻探需求进行调整。',
                '钻杆': '钻杆是连接地面设备和井底钻头的管道，通常由高强度合金钢制成。它不仅传递扭矩和旋转力，还作为泥浆循环的通道，将泥浆输送到井底并带回岩屑。钻杆通常由多根单根连接而成，随着井深的增加而逐步加长。',
                '泥浆泵': '泥浆泵是钻井液循环系统的核心设备，用于将泥浆从泥浆池吸入，加压后通过钻杆输送到井底。泥浆在井底起到冷却钻头、携带岩屑、平衡地层压力等重要作用。泥浆泵通常具有较高的压力和流量能力。',
                '泥浆循环系统': '泥浆循环系统是钻机的重要组成部分，包括泥浆泵、泥浆池、泥浆净化设备等。它的主要功能是将泥浆循环输送到井底，冷却钻头、携带岩屑返回地面，并对泥浆进行净化处理，使其能够再次循环使用。',
                '井控设备': '井控设备是确保钻井安全的关键装置，包括防喷器、节流管汇、压井管汇等。它们的主要功能是在钻井过程中控制地层流体的涌出，防止井喷事故的发生。井控设备需要定期检查和维护，确保其可靠性。',
                '动力系统': '动力系统为钻机提供动力，通常包括柴油机、发电机、电动机等设备。柴油机是最常用的动力源，能够提供较大的功率。发电机将机械能转换为电能，为钻机的电动设备提供电力。动力系统的设计需要考虑钻机的功率需求和工作环境。',
                '电控系统': '电控系统是钻机的神经中枢，用于控制和监测钻机的各种设备和参数。它包括各种控制器、传感器、仪表等，能够实现自动化控制和数据采集。现代钻机的电控系统通常采用PLC或DCS控制系统，具有高度的可靠性和智能化水平。',
                '底座': '底座是钻机的基础结构，支撑整个钻机的重量，并为各种设备提供安装平台。它通常由钢结构制成，具有足够的强度和稳定性。底座的设计需要考虑钻机的移动性和安装便利性，一些大型钻机的底座还具有升降功能，便于调整工作高度。',
                '生活区': '生活区为钻井工作人员提供住宿、饮食和休息的场所。它通常包括宿舍、食堂、卫生间、娱乐室等设施，配备有空调、供暖、供水等系统，以满足工作人员的基本生活需求。生活区的设计注重舒适性和安全性，为工作人员提供良好的工作和生活环境。',
                '储存区': '储存区用于存放钻井所需的各种物资和设备，包括钻杆、钻头、泥浆材料、工具等。它需要合理规划和管理，确保物资的安全存放和方便取用。储存区通常设有货架、仓库等设施，并配备有搬运设备，如起重机、叉车等。',
                '控制中心': '控制中心是钻机的操作核心，操作人员在这里监控和控制钻机的各种设备和参数。它通常配备有先进的监控系统、自动化控制设备和通信设备，使操作人员能够实时了解钻机的工作状态，并及时做出调整和决策。控制中心的设计注重人机工程学，提高操作人员的工作效率和舒适度。',
                '起重机': '起重机是钻机上的重要辅助设备，用于吊装和搬运各种物资和设备。它通常安装在钻机的特定位置，具有不同的起重量和工作半径，以满足不同的吊装需求。起重机的操作需要经过专业培训的人员进行，确保吊装作业的安全。',
                '泥浆池': '泥浆池是储存和处理钻井液的场所，通常由多个池子组成，包括吸入池、循环池、沉淀池等。泥浆在泥浆池中进行沉淀、分离和处理，去除其中的岩屑和杂质，然后再次循环使用。泥浆池的设计需要考虑泥浆的容量、循环效率和环保要求。',
                '钻井液处理系统': '钻井液处理系统用于对钻井液进行净化和处理，确保其性能符合钻井要求。它通常包括振动筛、除砂器、除泥器、离心机等设备，能够去除泥浆中的岩屑、砂粒和其他杂质。钻井液处理系统的工作效率直接影响钻井速度和质量。'
            };
            
            // 存储所有创建的标签
            const labels = new Map();
            
            // 绘图模式变量
            let isDrawing = false;
            let drawingPoints = [];
            let drawingArea = null;
            
            // 为每个区域创建标签元素
            areas.forEach(area => {
                const name = area.getAttribute('data-name');
                const url = area.getAttribute('data-url');
                
                // 创建标签元素
                const label = document.createElement('div');
                label.className = 'area-label';
                label.textContent = name;
                label.dataset.name = name;
                
                // 将标签添加到容器
                labelsContainer.appendChild(label);
                labels.set(name, label);
                
                // 设置标签位置
                const rect = area.getBoundingClientRect();
                const containerRect = document.querySelector('.image-map-container').getBoundingClientRect();
                
                const centerX = rect.left - containerRect.left + rect.width / 2;
                const centerY = rect.top - containerRect.top + rect.height / 2;
                
                label.style.left = `${centerX}px`;
                label.style.top = `${centerY}px`;
                
                // 区域点击事件
                area.addEventListener('click', (e) => {
                    if (isDrawing) return;
                    
                    e.stopPropagation();
                    
                    // 移除其他所有活跃状态
                    areas.forEach(a => a.classList.remove('active'));
                    labels.forEach(l => l.classList.remove('active'));
                    
                    // 添加当前活跃状态
                    area.classList.add('active');
                    labels.get(name).classList.add('active');
                    
                    // 更新区域详情面板
                    detailsTitle.textContent = name;
                    detailsDescription.textContent = areaDetailsData[name] || '这是石油钻机的一个组成部分。';
                    detailsLink.href = url;
                    
                    // 显示区域详情面板和遮罩层
                    areaDetails.classList.add('active');
                    overlay.classList.add('active');
                });
            });
            
            // 点击地图背景重置所有选择
            document.querySelector('.image-map-container').addEventListener('click', (e) => {
                if (isDrawing) return;
                
                resetSelection();
            });
            
            // 重置按钮事件
            resetBtn.addEventListener('click', resetSelection);
            
            // 关闭详情面板
            closeDetails.addEventListener('click', () => {
                areaDetails.classList.remove('active');
                overlay.classList.remove('active');
            });
            
            // 信息面板控制
            infoBtn.addEventListener('click', () => {
                infoPanel.classList.add('active');
                overlay.classList.add('active');
            });
            
            menuBtn.addEventListener('click', () => {
                infoPanel.classList.add('active');
                overlay.classList.add('active');
            });
            
            closeInfoBtn.addEventListener('click', () => {
                infoPanel.classList.remove('active');
                overlay.classList.remove('active');
            });
            
            // 点击遮罩层关闭面板
            overlay.addEventListener('click', () => {
                areaDetails.classList.remove('active');
                infoPanel.classList.remove('active');
                overlay.classList.remove('active');
            });
            
            // 重置选择状态
            function resetSelection() {
                areas.forEach(a => a.classList.remove('active'));
                labels.forEach(l => l.classList.remove('active'));
                areaDetails.classList.remove('active');
                overlay.classList.remove('active');
            }
            
            // 鼠标移动时更新坐标
            imageMapContainer.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                
                const rect = imageMapContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                mouseCoords.textContent = `${Math.round(x)}, ${Math.round(y)}`;
            });
            
            // 绘图功能 - 开始绘制
            function startDrawing() {
                if (isDrawing) return;
                
                isDrawing = true;
                drawingPoints = [];
                coordinatesOutput.value = '正在绘制...点击图片添加顶点，点击结束按钮完成';
                drawingHint.classList.remove('hidden');
                coordinateDisplay.classList.remove('hidden');
                
                // 禁用所有区域交互
                areas.forEach(area => {
                    area.style.pointerEvents = 'none';
                });
                
                // 禁用移动设备按钮
                drawStartBtn.disabled = true;
                drawEndBtn.disabled = false;
                
                // 禁用桌面端按钮
                drawStartDesktopBtn.disabled = true;
                drawEndDesktopBtn.disabled = false;
            }
            
            // 绘图功能 - 结束绘制
            function endDrawing() {
                if (!isDrawing) return;
                
                isDrawing = false;
                drawingHint.classList.add('hidden');
                coordinateDisplay.classList.add('hidden');
                
                // 启用所有区域交互
                areas.forEach(area => {
                    area.style.pointerEvents = 'auto';
                });
                
                // 启用移动设备按钮
                drawStartBtn.disabled = false;
                drawEndBtn.disabled = true;
                
                // 启用桌面端按钮
                drawStartDesktopBtn.disabled = false;
                drawEndDesktopBtn.disabled = true;
                
                // 生成并显示坐标信息
                if (drawingPoints.length >= 3) {
                    const rect = imageMapContainer.getBoundingClientRect();
                    const percentPoints = drawingPoints.map(point => {
                        const xPercent = ((point.x / rect.width) * 100).toFixed(2);
                        const yPercent = ((point.y / rect.height) * 100).toFixed(2);
                        return `${xPercent}% ${yPercent}%`;
                    });
                    
                    const clipPath = `polygon(${percentPoints.join(', ')})`;
                    const style = `position: absolute; top: 0; left: 0; width: 100%; height: 100%; clip-path: ${clipPath};`;
                    
                    coordinatesOutput.value = `CSS Style:\n${style}\n\nClip-path:\n${clipPath}\n\nPoints:\n${percentPoints.join('\n')}`;
                } else {
                    coordinatesOutput.value = '至少需要3个点才能形成多边形';
                    clearDrawing();
                }
            }
            
            // 绘图功能 - 清除
            function clearDrawing() {
                // 移除所有绘制点
                document.querySelectorAll('.drawing-point').forEach(point => point.remove());
                
                // 移除绘制区域
                if (drawingArea) {
                    drawingArea.remove();
                    drawingArea = null;
                }
                
                drawingPoints = [];
                polygonPoints.textContent = '0个点';
                
                if (!isDrawing) {
                    coordinatesOutput.value = '';
                }
            }
            
            // 绘图功能 - 添加点
            imageMapContainer.addEventListener('click', (e) => {
                if (!isDrawing) return;
                
                e.stopPropagation();
                
                // 获取相对于容器的坐标
                const rect = imageMapContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // 创建点标记
                const point = document.createElement('div');
                point.className = 'drawing-point';
                point.style.left = `${x}px`;
                point.style.top = `${y}px`;
                
                const label = document.createElement('div');
                label.className = 'drawing-point-label';
                label.textContent = drawingPoints.length + 1;
                point.appendChild(label);
                
                imageMapContainer.appendChild(point);
                drawingPoints.push({ x, y });
                
                // 更新顶点计数
                polygonPoints.textContent = `${drawingPoints.length}个点`;
                
                // 更新绘制区域
                updateDrawingArea();
            });
            
            // 更新绘制的多边形区域
            function updateDrawingArea() {
                if (drawingPoints.length < 2) return;
                
                // 如果不存在，创建新的绘制区域
                if (!drawingArea) {
                    drawingArea = document.createElement('div');
                    drawingArea.className = 'drawing-area';
                    imageMapContainer.appendChild(drawingArea);
                }
                
                // 生成多边形的clip-path
                const clipPath = `polygon(${drawingPoints.map(p => `${p.x}px ${p.y}px`).join(', ')})`;
                drawingArea.style.clipPath = clipPath;
                drawingArea.style.width = '100%';
                drawingArea.style.height = '100%';
            }
            
            // 为所有按钮绑定事件
            drawStartBtn.addEventListener('click', startDrawing);
            drawEndBtn.addEventListener('click', endDrawing);
            drawClearBtn.addEventListener('click', clearDrawing);
            drawStartDesktopBtn.addEventListener('click', startDrawing);
            drawEndDesktopBtn.addEventListener('click', endDrawing);
            drawClearDesktopBtn.addEventListener('click', clearDrawing);
            
            // 复制坐标
            copyBtn.addEventListener('click', () => {
                if (coordinatesOutput.value) {
                    coordinatesOutput.select();
                    document.execCommand('copy');
                    
                    // 显示复制成功提示
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = '已复制!';
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                    }, 2000);
                }
            });
        });
    </script>
</body>
